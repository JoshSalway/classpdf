<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Attribution - ClassPDF</title>
    <meta
      name="description"
      content="ClassPDF is open source. Get the source code on GitHub. Based on BentoPDF, used under the AGPL-3.0 license."
    />
    <meta name="author" content="ClassPDF" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://classpdf.com/attribution" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://classpdf.com/attribution" />
    <meta property="og:title" content="Attribution - ClassPDF" />
    <meta property="og:site_name" content="ClassPDF" />

    <link href="/src/css/styles.css" rel="stylesheet" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg?v=2" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/images/favicon-192x192.png?v=2"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/images/favicon-512x512.png?v=2"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/apple-touch-icon.png?v=2"
    />
    <link rel="icon" href="/favicon.ico?v=2" sizes="32x32" />
  </head>

  <body class="antialiased">
    {{> navbar }}

    <div id="app" class="min-h-screen container mx-auto p-4 md:p-8">
      <section class="max-w-2xl mx-auto py-16">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-6">
          Attribution
        </h1>

        <p class="text-lg text-slate-600 leading-relaxed mb-6">
          ClassPDF is open source. Source code:
          <a
            href="https://github.com/JoshSalway/classpdf"
            target="_blank"
            rel="noopener noreferrer"
            class="text-green-600 hover:underline"
            >github.com/JoshSalway/classpdf</a
          >.
        </p>

        <p class="text-lg text-slate-600 leading-relaxed">
          ClassPDF is based on
          <a
            href="https://github.com/alam00000/bentopdf"
            target="_blank"
            rel="noopener noreferrer"
            class="text-green-600 hover:underline"
            >BentoPDF</a
          >
          (github.com/alam00000/bentopdf), an open-source PDF toolkit, used under
          the
          <a
            href="https://www.gnu.org/licenses/agpl-3.0.html"
            target="_blank"
            rel="noopener noreferrer"
            class="text-green-600 hover:underline"
            >AGPL-3.0</a
          >
          license.
        </p>
      </section>
    </div>

    {{> footer }}

    <script type="module" src="src/js/utils/lucide-init.ts"></script>
    <script type="module" src="src/js/mobileMenu.ts"></script>
  </body>
</html>
