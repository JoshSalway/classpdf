<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    {{> ga }}

    <!-- Sentry browser error tracking (self-hosted at sentry.joshsalway.com) -->
    <script
      src="https://browser.sentry-cdn.com/8.55.0/bundle.tracing.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      Sentry.init({
        dsn: 'https://350dc8b95e36d853bfc2b3379fe19c92@sentry.joshsalway.com/14',
        tracesSampleRate: 0.1,
      });
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>Contact ClassPDF - Get in Touch | Support</title>
    <meta
      name="description"
      content="Contact ClassPDF for support, questions, or feedback. Reach us at contact@classpdf.com - we're here to help with your PDF needs."
    />
    <meta name="author" content="ClassPDF" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://classpdf.com/contact" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://classpdf.com/contact" />
    <meta
      property="og:title"
      content="Contact ClassPDF - Get in Touch | Support"
    />
    <meta
      property="og:description"
      content="Contact ClassPDF for support, questions, or feedback. Reach us at contact@classpdf.com - we're here to help with your PDF needs."
    />
    <meta
      property="og:image"
      content="https://classpdf.com/images/og-contact.png"
    />
    <meta property="og:site_name" content="ClassPDF" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Contact ClassPDF - Get in Touch | Support"
    />
    <meta
      name="twitter:description"
      content="Contact ClassPDF for support, questions, or feedback. Reach us at contact@classpdf.com - we're here to help with your PDF needs."
    />
    <meta
      name="twitter:image"
      content="https://classpdf.com/images/twitter-contact.png"
    />
    <meta name="twitter:site" content="@ClassPDF" />

    <link href="/src/css/styles.css" rel="stylesheet" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg?v=2" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/images/favicon-192x192.png?v=2"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/images/favicon-512x512.png?v=2"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/apple-touch-icon.png?v=2"
    />
    <link rel="icon" href="/favicon.ico?v=2" sizes="32x32" />
  </head>

  <body class="antialiased bg-white text-slate-500">
    {{> navbar }}

    <div id="app" class="min-h-screen container mx-auto p-4 md:p-8">
      <section id="contact-hero" class="text-center py-16 md:py-24">
        <h1
          class="text-4xl md:text-5xl font-bold text-slate-900 mb-4"
          data-i18n="contact.title"
        >
          Get in Touch
        </h1>
        <p
          class="text-lg md:text-xl text-slate-500 max-w-3xl mx-auto"
          data-i18n="contact.subtitle"
        >
          We'd love to hear from you. Whether you have a question, feedback, or
          a feature request, please don't hesitate to reach out.
        </p>
      </section>

      <div class="max-w-2xl mx-auto text-center py-8">
        <p class="text-lg text-slate-500">
          <span data-i18n="contact.email"
            >You can reach us directly by email at:</span
          >
          <a
            href="mailto:contact@classpdf.com"
            class="text-green-600 underline hover:text-green-600"
            >contact@classpdf.com</a
          >
        </p>
      </div>
    </div>

    {{> footer }}

    <script type="module" src="src/js/utils/lucide-init.ts"></script>
    <script type="module" src="src/js/main.ts"></script>
    <script type="module" src="src/js/mobileMenu.ts"></script>
    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Contact ClassPDF - Get in Touch | Support",
        "url": "https://classpdf.com/contact"
      }
    </script>
  </body>
</html>
