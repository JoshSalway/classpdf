<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>About ClassPDF - Free PDF Tools for Teachers</title>
    <meta
      name="description"
      content="ClassPDF gives teachers free PDF tools that run right in the browser - merge, split, compress and convert. Files never leave your device. Brought to you by the SproutSheets team."
    />
    <meta name="author" content="ClassPDF" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://classpdf.com/about" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://classpdf.com/about" />
    <meta property="og:title" content="About ClassPDF - Free PDF Tools for Teachers" />
    <meta
      property="og:description"
      content="Free, private, browser-based PDF tools for teachers. Files never leave your device."
    />
    <meta property="og:site_name" content="ClassPDF" />

    <link href="/src/css/styles.css" rel="stylesheet" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/images/favicon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/images/favicon-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/apple-touch-icon.png"
    />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
  </head>

  <body class="antialiased">
    {{> navbar }}

    <div id="app" class="min-h-screen container mx-auto p-4 md:p-8">
      <section class="max-w-2xl mx-auto py-16">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-6">
          About ClassPDF
        </h1>

        <p class="text-lg text-slate-600 leading-relaxed mb-6">
          ClassPDF is a set of free, private, in-browser PDF tools for teachers -
          merge, split, compress and convert PDFs with no sign-up. Everything
          runs on your own device, so your files never leave your computer.
        </p>

        <p class="text-lg text-slate-600 leading-relaxed">
          Brought to you by the
          <a
            href="https://sproutsheets.com"
            target="_blank"
            rel="noopener"
            class="text-green-600 hover:underline"
            >SproutSheets</a
          >
          team.
        </p>
      </section>
    </div>

    {{> footer }}

    <script type="module" src="src/js/utils/lucide-init.ts"></script>
    <script type="module" src="src/js/mobileMenu.ts"></script>
  </body>
</html>
