<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>ClassPDF - Free Online PDF Tools | Privacy-First PDF Toolkit</title>
    <meta
      name="title"
      content="ClassPDF - Free Online PDF Tools | Privacy-First PDF Toolkit"
    />
    <meta
      name="description"
      content="★ Free online PDF tools - Merge, split, compress, convert PDFs ★ 100% browser-based ★ No signup required ★ Unlimited files ★ Privacy-first & secure ★ Works offline ★ 100+ PDF tools"
    />
    <meta
      name="keywords"
      content="free pdf tools, online pdf editor, merge pdf, compress pdf, split pdf, convert pdf, pdf toolkit, privacy-first pdf, browser-based pdf tools"
    />
    <meta name="author" content="ClassPDF" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://classpdf.com/" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://classpdf.com/" />
    <meta
      property="og:title"
      content="ClassPDF - Free Online PDF Tools | Privacy-First PDF Toolkit"
    />
    <meta
      property="og:description"
      content="Free online PDF toolkit with 100+ tools. Merge, split, compress, convert PDFs - 100% browser-based, no signup, unlimited files, privacy-first."
    />
    <meta
      property="og:image"
      content="https://classpdf.com/images/og-home.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ClassPDF" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://classpdf.com/" />
    <meta name="twitter:title" content="ClassPDF - Free Online PDF Tools" />
    <meta
      name="twitter:description"
      content="Free PDF tools that run in your browser. Merge, split, compress, convert - all free, no signup, privacy-first."
    />
    <meta
      name="twitter:image"
      content="https://classpdf.com/images/twitter-home.png"
    />
    <meta name="twitter:site" content="@ClassPDF" />
    <meta name="twitter:creator" content="@ClassPDF" />

    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="ClassPDF" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/images/favicon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/images/favicon-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/apple-touch-icon.png"
    />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />

    <link href="src/css/styles.css" rel="stylesheet" />
  </head>

  <body class="antialiased">
    {{> navbar }}

    <div id="app" class="min-h-screen container mx-auto p-4 md:p-8">
      <section id="hero-section" class="text-center pt-10 pb-6">
        <h1
          class="text-2xl md:text-3xl font-bold text-white"
          data-i18n="hero.title"
        >
          Free PDF tools for teachers
        </h1>
        <p
          class="text-gray-400 mt-2"
          data-i18n="hero.builtForPrivacy"
        >
          Every tool runs in your browser. Files never leave your device.
        </p>
      </section>

      <div id="grid-view" class="mt-4">
        <div class="mb-8 max-w-lg mx-auto">
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
              <i data-lucide="search" class="w-5 h-5 text-gray-400"></i>
            </span>
            <input
              type="text"
              id="search-bar"
              class="w-full pl-10 pr-4 py-3 bg-gray-700 text-white border border-gray-600 rounded-lg focus:ring-indigo-500 focus:border-indigo-500"
              placeholder="Search for a tool (e.g., 'split', 'organize'...)"
              data-i18n-placeholder="tools.searchPlaceholder"
            />
            <span
              class="absolute inset-y-0 right-0 flex items-center rounded-lg pr-2 gap-2"
            >
              <kbd
                id="shortcut"
                class="bg-gray-800 px-2.5 py-1.5 rounded-md text-xs font-semibold text-gray-300 border border-gray-700 shadow-sm"
              ></kbd>
              <button
                id="open-shortcuts-btn"
                class="p-1 hover:bg-gray-600 rounded-md text-gray-400 hover:text-white transition-colors"
                title="Keyboard Shortcuts"
              >
                <i data-lucide="settings" class="w-4 h-4"></i>
              </button>
            </span>
          </div>
        </div>

        <div
          id="tool-grid"
          class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"
        ></div>
      </div>

      <div
        id="tool-interface"
        class="hidden w-full max-w-4xl mx-auto bg-gray-800 rounded-xl shadow-2xl p-6 md:p-8 border border-gray-700"
      >
        <button
          id="back-to-grid"
          class="flex items-center gap-2 text-indigo-400 hover:text-indigo-300 mb-6 font-semibold"
        >
          <i data-lucide="arrow-left" class="cursor-pointer"></i>
          <span class="cursor-pointer" data-i18n="tools.backToTools">
            Back to Tools
          </span>
        </button>
        <div id="tool-content"></div>
      </div>

      <div
        id="loader-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50"
      >
        <div
          class="bg-gray-800 p-8 rounded-lg flex flex-col items-center gap-4 border border-gray-700 shadow-xl"
        >
          <div class="solid-spinner"></div>
          <p
            id="loader-text"
            class="text-white text-lg font-medium"
            data-i18n="loader.processing"
          >
            Processing...
          </p>
        </div>
      </div>

      <div
        id="alert-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4"
      >
        <div
          class="bg-gray-800 max-w-sm w-full p-6 rounded-lg border border-gray-700 shadow-xl text-center"
        >
          <h3 id="alert-title" class="text-xl font-bold text-white mb-2">
            Alert
          </h3>
          <p id="alert-message" class="text-gray-300 mb-6 whitespace-pre-line">
            This is an alert message.
          </p>
          <button
            id="alert-ok"
            class="btn bg-indigo-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-indigo-700"
          >
            OK
          </button>
        </div>
      </div>

      <div
        id="preview-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-40 p-4"
      >
        <div
          class="bg-white text-black rounded-lg shadow-xl w-full max-w-4xl h-[90vh] flex flex-col"
        >
          <div class="p-4 border-b flex justify-between items-center">
            <h3 class="text-xl font-bold">Document Preview</h3>
            <div class="flex gap-4">
              <button
                id="preview-download-btn"
                class="btn bg-indigo-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-indigo-700"
              >
                Download as PDF
              </button>
              <button
                id="preview-close-btn"
                class="btn bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-gray-700"
              >
                Close
              </button>
            </div>
          </div>
          <div id="preview-content" class="p-8 overflow-y-auto flex-grow"></div>
        </div>
      </div>

      <!-- Shortcuts Modal -->
      {{> settings-modal }}

      <!-- Warning Modal -->
      {{> warning-modal }}

      <div
        id="password-modal"
        class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4"
      >
        <div
          class="bg-gray-800 rounded-xl border border-gray-700 shadow-2xl max-w-md w-full overflow-hidden"
        >
          <div class="p-6">
            <div class="flex items-start gap-4 mb-4">
              <div
                class="w-12 h-12 flex items-center justify-center rounded-full bg-indigo-500/10 flex-shrink-0"
              >
                <i data-lucide="lock" class="w-6 h-6 text-indigo-400"></i>
              </div>
              <div class="flex-1">
                <h3
                  id="password-modal-title"
                  class="text-xl font-bold text-white mb-1"
                >
                  Password Required
                </h3>
                <p
                  id="password-modal-filename"
                  class="text-gray-400 text-sm truncate"
                ></p>
              </div>
            </div>
            <div class="mt-4">
              <div class="relative">
                <input
                  type="password"
                  id="password-modal-input"
                  class="w-full bg-gray-700 border border-gray-600 text-gray-200 rounded-lg px-4 py-2.5 pr-10 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                  placeholder="Enter password"
                  autocomplete="off"
                />
                <button
                  id="password-modal-toggle"
                  type="button"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200"
                >
                  <i data-lucide="eye" class="w-4 h-4"></i>
                </button>
              </div>
              <p
                id="password-modal-error"
                class="text-xs text-red-400 mt-2 hidden"
              ></p>
            </div>
          </div>
          <div class="flex gap-3 p-4 border-t border-gray-700">
            <button
              id="password-modal-cancel"
              class="flex-1 px-4 py-2.5 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-medium transition-colors"
            >
              Skip
            </button>
            <button
              id="password-modal-submit"
              class="flex-1 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors"
            >
              Unlock
            </button>
          </div>
        </div>
      </div>


      <div id="signature-ghost" class="hidden"></div>

      <!-- Scroll to Top Button -->
      <button
        id="scroll-to-top-btn"
        class="fixed bottom-12 right-8 bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-full shadow-lg transition-all duration-300 opacity-0 translate-y-10 invisible z-40"
        aria-label="Scroll to top"
      >
        <i data-lucide="arrow-up" class="w-6 h-6"></i>
      </button>
    </div>

    {{> footer }}

    <script type="module" src="src/js/utils/lucide-init.ts"></script>
    <script type="module" src="src/js/main.ts"></script>
    <script type="module" src="src/js/mobileMenu.ts"></script>
    <script type="module" src="src/js/sw-register.ts"></script>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ClassPDF",
        "url": "https://classpdf.com",
        "description": "Free, privacy-first online PDF toolkit with 100+ tools. Merge, split, compress, convert PDFs - 100% browser-based, no signup required, unlimited files.",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Any - Web Browser",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Merge PDF",
          "Split PDF",
          "Compress PDF",
          "Convert PDF to Word",
          "Convert PDF to JPG",
          "Edit PDF",
          "Rotate PDF",
          "Organize PDF",
          "PDF to Excel",
          "Sign PDF",
          "Encrypt PDF",
          "Decrypt PDF"
        ],
        "browserRequirements": "Requires JavaScript. Requires HTML5."
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ClassPDF",
        "url": "https://classpdf.com",
        "logo": "https://classpdf.com/images/favicon.svg",
        "description": "Privacy-first, free online PDF toolkit",
        "sameAs": ["https://github.com/alam00000/bentopdf"],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Support",
          "url": "https://classpdf.com/contact"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is ClassPDF really free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, absolutely. All tools on ClassPDF are 100% free to use, with no file limits, no sign-ups, and no watermarks. We believe everyone deserves access to simple, powerful PDF tools without a paywall."
            }
          },
          {
            "@type": "Question",
            "name": "Are my files secure? Where are they processed?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your files are as secure as possible because they never leave your computer. All processing happens directly in your web browser (client-side). We never upload your files to a server, so you maintain complete privacy and control over your documents."
            }
          },
          {
            "@type": "Question",
            "name": "Does it work on Mac, Windows, and Mobile?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! Since ClassPDF runs entirely in your browser, it works on any operating system with a modern web browser, including Windows, macOS, Linux, iOS, and Android."
            }
          },
          {
            "@type": "Question",
            "name": "Is ClassPDF GDPR compliant?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. ClassPDF is fully GDPR compliant. Since all file processing happens locally in your browser and we never collect or transmit your files to any server, we have no access to your data. This ensures you are always in control of your documents."
            }
          },
          {
            "@type": "Question",
            "name": "Do you store or track any of my files?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. We never store, track, or log your files. Everything you do on ClassPDF happens in your browser memory and disappears once you close the page. There are no uploads, no history logs, and no servers involved."
            }
          }
        ]
      }
    </script>
  </body>
</html>
